<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — TravelGuide</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      padding: 24px;
    }
    body.light-theme { background: #fafafa; color: #171717; }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 24px; margin-bottom: 12px; }
    p { color: #737373; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #8B5CF6;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #7C3AED; }
    .light-theme .container p { color: #525252; }
  </style>
  <script>try{if(localStorage.getItem('theme')==='light')document.body.classList.add('light-theme')}catch(e){}</script>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>
      TravelGuide needs an internet connection to search for quests, plan trips, and load maps.
      Check your connection and try again.
    </p>
    <button onclick="if(navigator.onLine){window.location.reload()}else{this.textContent='Still offline...';setTimeout(()=>{this.textContent='Try Again'},2000)}">Try Again</button>
  </div>
</body>
</html>
